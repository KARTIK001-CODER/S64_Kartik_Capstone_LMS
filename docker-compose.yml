services:
  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    env_file: ./Backend/.env
    environment:
      - FRONTEND_URL=http://localhost:80
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo-data:
  uploads:
